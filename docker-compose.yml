version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jellydj-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////config/jellydj.db
      - TZ=${TZ:-UTC}
    volumes:
      - jellydj-config:/config
      # YouTube Rips: set YOUTUBE_RIPS_PATH in your .env to a host folder that your
      # Jellyfin music library also reads from. The backend writes downloaded MP3s
      # here; Jellyfin picks them up on its next library scan.
      # Example (.env): YOUTUBE_RIPS_PATH=D:/StreamingVault/Youtube
      - ${YOUTUBE_RIPS_PATH:-jellydj-youtube-rips}:/music/youtube-rips
    networks:
      - jellydj-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: jellydj-frontend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    ports:
      - "${JELLYDJ_PORT:-7879}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jellydj-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  jellydj-config:
    name: jellydj-config
  # Fallback anonymous volume used when YOUTUBE_RIPS_PATH is not set in .env.
  # Files land here but Jellyfin won't see them — configure YOUTUBE_RIPS_PATH
  # to a real shared path for the feature to work end-to-end.
  jellydj-youtube-rips:

networks:
  jellydj-net:
    name: jellydj-net
    driver: bridge
