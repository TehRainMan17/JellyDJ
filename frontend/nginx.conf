
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # NOTE: JellyDJ is designed for self-hosted use behind a reverse proxy.
    # For internet-facing deployments you MUST add TLS termination in front
    # of this container (Caddy, Traefik, nginx-proxy, etc.) and add HSTS there.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # X-XSS-Protection is deprecated in modern browsers (Chrome 78+, Edge 107+
    # removed it entirely). It can cause parsing bugs and is superseded by CSP.
    # Explicitly set to 0 to disable the legacy heuristic filter, which has
    # known bypass techniques and can itself introduce XSS vectors.
    add_header X-XSS-Protection "0" always;
    # Content-Security-Policy
    #
    # 'unsafe-inline' has been removed from both script-src and style-src:
    #
    #   script-src: Vite's modulePreload polyfill (the only inline <script> in
    #     the default build) is disabled via modulePreload: { polyfill: false }
    #     in vite.config.js.  All JS is loaded from external .js chunk files.
    #
    #   style-src: Tailwind and all component CSS is extracted to external .css
    #     files at build time.  React's style={} prop writes to element.style
    #     (a DOM attribute), not a <style> tag, so it doesn't require this
    #     directive.  Google Fonts is loaded via <link rel="stylesheet"> from
    #     fonts.googleapis.com, which is explicitly whitelisted below.
    #
    # Google Fonts:
    #   connect-src  — the preconnect hints in index.html
    #   style-src    — the stylesheet served from fonts.googleapis.com
    #   font-src     — the actual woff2 files served from fonts.gstatic.com
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none';" always;

    # Proxy /api requests to the FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Discovery populate runs synchronously and calls Lidarr once per
        # recommended album (validate_album_in_lidarr, 15s timeout each).
        # With a large library this can take several minutes. Nginx's default
        # proxy_read_timeout of 60s was silently killing the connection and
        # returning a "network error" to the browser while the backend kept
        # running — resulting in no backend log output and a confusing failure.
        proxy_read_timeout    600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    600s;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
