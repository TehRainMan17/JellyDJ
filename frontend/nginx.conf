
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # NOTE: JellyDJ is designed for self-hosted use behind a reverse proxy.
    # For internet-facing deployments you MUST add TLS termination in front
    # of this container (Caddy, Traefik, nginx-proxy, etc.) and add HSTS there.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # Tighten as needed — 'unsafe-inline' is required by the Vite React bundle
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none';" always;

    # Proxy /api requests to the FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Discovery populate runs synchronously and calls Lidarr once per
        # recommended album (validate_album_in_lidarr, 15s timeout each).
        # With a large library this can take several minutes. Nginx's default
        # proxy_read_timeout of 60s was silently killing the connection and
        # returning a "network error" to the browser while the backend kept
        # running — resulting in no backend log output and a confusing failure.
        proxy_read_timeout    600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    600s;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
